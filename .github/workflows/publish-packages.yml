name: Publish Packages
on:
  push:
    paths:
      - 'shared/model/**'
      - 'backend/api/**'
    branches: [main, develop-2026]

permissions:
  contents: read
  packages: write

jobs:
  publish-shared-model:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'shared/model/') || contains(github.event.head_commit.added, 'shared/model/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :shared:model:publishAllPublicationsToGitHubPackagesRepository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  publish-backend-api:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'backend/api/') || contains(github.event.head_commit.added, 'backend/api/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :backend:api:publishMavenPublicationToGitHubPackagesRepository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
